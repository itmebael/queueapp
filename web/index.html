<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A professional queue management system for departments.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SSU Queue System">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SSU Queue System</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #FFFFFF;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      font-family: 'Inter', sans-serif;
    }
    .loading-container {
      text-align: center;
    }
    .loader {
      width: 60px;
      height: 60px;
      border: 5px solid #E0E0E0;
      border-bottom-color: #263277;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }
    .loading-text {
      color: #263277;
      margin-top: 20px;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    } 
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="loader"></div>
    <div class="loading-text">Loading SSU Queue System...</div>
    <div id="loading-error" style="display: none; color: red; margin-top: 20px;">
      Taking longer than expected... <br>
      Please try refreshing the page.
    </div>
  </div>
  <script>
    setTimeout(function() {
      var loader = document.querySelector('.loading-text');
      var error = document.getElementById('loading-error');
      if (loader && error) {
        error.style.display = 'block';
      }
    }, 10000); // Show error after 10 seconds
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
